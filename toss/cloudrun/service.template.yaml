apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: open-close-check-auth
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
        - image: asia-northeast3-docker.pkg.dev/PROJECT_ID/open-close-check/open-close-check-auth:latest
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: TOSS_API_BASE_URL
              value: https://apps-in-toss-api.toss.im
            - name: TOSS_MTLS_CERT_PATH
              value: /etc/secrets/toss-mtls-cert/client-cert.pem
            - name: TOSS_MTLS_KEY_PATH
              value: /etc/secrets/toss-mtls-key/client-key.pem
            - name: TOSS_MTLS_CA_PATH
              value: /etc/secrets/toss-mtls-ca/ca.pem
            - name: TOSS_AUTH_ALLOWED_ORIGIN
              value: https://YOUR_FRONTEND_ORIGIN
            - name: TOSS_AUTH_COOKIE_SAMESITE
              value: None
            - name: TOSS_AUTH_COOKIE_SECURE
              value: "true"
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          volumeMounts:
            - name: toss-mtls-cert
              mountPath: /etc/secrets/toss-mtls-cert
            - name: toss-mtls-key
              mountPath: /etc/secrets/toss-mtls-key
            - name: toss-mtls-ca
              mountPath: /etc/secrets/toss-mtls-ca
      volumes:
        - name: toss-mtls-cert
          secret:
            secretName: toss-mtls-cert
            items:
              - key: latest
                path: client-cert.pem
        - name: toss-mtls-key
          secret:
            secretName: toss-mtls-key
            items:
              - key: latest
                path: client-key.pem
        - name: toss-mtls-ca
          secret:
            secretName: toss-mtls-ca
            items:
              - key: latest
                path: ca.pem
